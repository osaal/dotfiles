# vim:fileencoding=utf-8:foldmethod=marker

#: Fonts 

font_family             family="FiraMono Nerd Font Mono"
bold_font               auto
italic_font             auto
bold_italic_font        auto

#: Text cursor customization

cursor                  #e8e8e8
cursor_shape            beam
cursor_shape_unfocused  hollow
cursor_trail            100

#: Scrollback

scrollbar               always
scrollbar_interactive   no
scrollbar_gap           0.2

#: Mouse

mouse_hide_wait         -1.0
url_color               #366309
url_style               straight
show_hyperlink_targets  yes
paste_actions           quote-urls-at-prompt,confirm,confirm-if-large
strip_trailing_spaces   smart

#: Terminal bell

enable_audio_bell       no
visual_bell_duration    2.0
bell_on_tab             "🔔 "

#: Window layout

confirm_os_window_close 0 

#: Tab bar

tab_bar_edge            top
tab_bar_margin_width    10.0
tab_bar_margin_height   4.0 0.0
tab_bar_style           powerline
tab_bar_min_tabs        1
tab_powerline_style     round
active_tab_foreground   #e8e8e8
active_tab_background   #630909
active_tab_font_style   bold
inactive_tab_foreground #444
inactive_tab_background #999
inactive_tab_font_style normal

#: Color scheme

background_opacity      0.5

#: Advanced

notify_on_cmd_finish    unfocused 15.0

#: Keyboard shortcuts

clear_all_shortcuts     yes
kitty_mod               alt

map ctrl+c              copy_and_clear_or_interrupt
map ctrl+v              paste_from_clipboard

map kitty_mod+k         scroll_line_up
map kitty_mod+j         scroll_line_down
map kitty_mod+home      scroll_home
map kitty_mod+end       scroll_end
map kitty_mod+h         show_scrollback
map kitty_mod+g         show_last_command_output

map kitty_mod+right     next_tab
map kitty_mod+left      previous_tab
map kitty_mod+t         new_tab
map kitty_mod+q         close_tab
map kitty_mod+.         move_tab_forward
map kitty_mod+,         move_tab_backward
map kitty_mod+1         goto_tab 1
map kitty_mod+2         goto_tab 2
map kitty_mod+3         goto_tab 3
map kitty_mod+4         goto_tab 4
map kitty_mod+5         goto_tab 5
map kitty_mod+6         goto_tab 6
map kitty_mod+7         goto_tab 7
map kitty_mod+8         goto_tab 8
map kitty_mod+9         goto_tab 9
map kitty_mod+0         goto_tab 10

map kitty_mod+plus      change_font_size all +2.0
map kitty_mod+minus     change_font_size all -2.0
map kitty_mod+backspace change_font_size all 0

map kitty_mod+e         open_url_with_hints

map f11                 toggle_fullscreen
map kitty_mod+l         clear_terminal reset active
map kitty_mod+f5        load_config_file
